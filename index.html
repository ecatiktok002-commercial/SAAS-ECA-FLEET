<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <meta name="theme-color" content="#1e40af" />
    
    <title>FleetSync | Modern Fleet & Payout Management</title>
    <meta name="title" content="FleetSync | Modern Fleet & Payout Management">
    <meta name="description" content="Manage agent commissions, reconcile bookings, and track your fleet's financial health in one place.">

    <meta property="og:type" content="website">
    <meta property="og:title" content="FleetSync | Modern Fleet & Payout Management">
    <meta property="og:description" content="Manage agent commissions, reconcile bookings, and track your fleet's financial health in one place.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
      body { margin: 0; background-color: #f8fafc; }
      #initial-loader {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Inter', sans-serif;
        color: #475569;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e2e8f0;
        border-top: 4px solid #3b82f6; /* Your brand color */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
        <p>Starting up...</p>
      </div>
    </div>
    
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
